name: publish-npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 1.15.2"
        required: false
        type: string
      tag:
        description: "npm dist-tag"
        required: false
        default: latest
        type: choice
        options:
          - latest
          - beta
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta*"

concurrency: publish-npm-${{ inputs.version || github.ref_name }}-${{ inputs.tag || 'latest' }}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'mufasa1611/cody-orchestra'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve version and tag
        id: resolve
        shell: bash
        run: |
          # Manual dispatch takes priority; otherwise derive from git tag (strip leading v)
          VERSION="${{ inputs.version }}"
          TAG="${{ inputs.tag }}"
          if [ -z "$VERSION" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$TAG" ]; then
            if echo "$VERSION" | grep -q '\-beta'; then
              TAG="beta"
            else
              TAG="latest"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION  tag=$TAG"

      - name: Validate release version
        shell: bash
        run: |
          node -e "if (!require('semver').valid(process.argv[1])) process.exit(1)" "${{ steps.resolve.outputs.version }}"

      - name: Build platform packages
        run: bun ./packages/codyx/script/build.ts
        env:
          CODY_VERSION: ${{ steps.resolve.outputs.version }}
          CODY_CHANNEL: ${{ steps.resolve.outputs.tag }}
          CODY_NPM_PACKAGE: codyx-ai
          GH_REPO: ${{ github.repository }}

      - name: Publish CLI packages
        run: bun ./packages/codyx/script/publish.ts
        env:
          CODY_VERSION: ${{ steps.resolve.outputs.version }}
          CODY_CHANNEL: ${{ steps.resolve.outputs.tag }}
          CODY_NPM_PACKAGE: codyx-ai
          CODY_NPM_ONLY: "1"
          GH_REPO: ${{ github.repository }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
