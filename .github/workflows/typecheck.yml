name: typecheck

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Check changed files
        run: bun run check:changed -- "${{ github.event.pull_request.base.sha || github.event.before }}"

      - name: Run lint
        run: bun run lint:ci

      - name: Run typecheck
        run: bun typecheck
